# 1. Define the Mono Downmix (route left+right to mono)
pcm.mono_downmix {
    type route
    slave.pcm "hw:0,0"
    slave.channels 2
    ttable.0.0 1   # Left to Mono
    ttable.1.0 1   # Right to Mono
}

# 2. Define a Software Volume Control attached to the mono_downmix
pcm.volume_controller {
    type softvol
    slave.pcm "mono_downmix"
    control {
        name "Master"       # This will appear in alsamixer
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

# 3. Set the Default device to the volume controller
pcm.!default {
    type plug
    slave.pcm "volume_controller"
}

ctl.!default {
    type hw
    card 0
}