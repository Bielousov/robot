# =======================
# PLAYBACK (Speaker)
# =======================

pcm.mono_downmix {
    type route
    slave.pcm "hw:0,0"
    slave.channels 2
    ttable.0.0 1   # left -> mono
    ttable.1.0 1   # right -> mono
}

pcm.master {
    type softvol
    slave.pcm "mono_downmix"
    control {
        name "Master"
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

pcm.playback {
    type plug
    slave.pcm "master"
}

# =======================
# CAPTURE (I2S Mic)
# =======================

pcm.i2s_mic {
    type plug
    slave.pcm "hw:0,0"
}

pcm.capture_boost {
    type softvol
    slave.pcm "i2s_mic"
    control {
        name "Capture Boost"
        card 0
    }
    min_dB 0.0
    max_dB 30.0
}

pcm.capture {
    type plug
    slave.pcm "capture_boost"
}

# =======================
# DEFAULT DEVICES
# =======================

pcm.!default {
    type asym
    playback.pcm "playback"
    capture.pcm  "capture"
}

ctl.!default {
    type hw
    card 0
}