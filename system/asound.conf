# -------- Playback (mono speaker) --------
pcm.speaker_hw {
    type hw
    card 0
    device 0
}

pcm.speaker_mono {
    type route
    slave {
        pcm speaker_hw
        channels 2
    }
    ttable.0.0 1
    ttable.0.1 1
}

pcm.speaker_vol {
    type softvol
    slave.pcm speaker_mono
    control {
        name "Master"
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

# -------- Capture (mono mic) --------
pcm.mic_hw {
    type hw
    card 0
    device 0
}

pcm.mic_mono {
    type route
    slave {
        pcm mic_hw
        channels 2
    }
    ttable.0.0 1
}

pcm.mic_gain {
    type softvol
    slave.pcm mic_mono
    control {
        name "Mic Gain"
        card 0
    }
    min_dB -10.0
    max_dB 30.0
}

# -------- Duplex --------
pcm.duplex {
    type asym
    playback.pcm "speaker_vol"
    capture.pcm "mic_gain"
}

pcm.!default {
    type plug
    slave.pcm "duplex"
}

ctl.!default {
    type hw
    card 0
}