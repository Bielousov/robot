# =======================
# GOOGLE VOICEHAT I2S SOUNDCARD CONFIG
# =======================
# Optimized for: dtoverlay=googlevoicehat-soundcard
# Hardware: I2S amplifier + digital microphone
# Card 0: Google voiceHAT SoundCard (mono device)

# Default PCM: asymmetric playback/capture
pcm.!default {
    type asym
    playback.pcm "playback"
    capture.pcm "capture"
}

# =======================
# PLAYBACK (I2S Amplifier)
# =======================
# Wrap in plug for automatic resampling, then route stereo to mono
pcm.playback {
    type plug
    slave.pcm "playback_route"
}

pcm.playback_route {
    type route
    slave.pcm "hw:0,0"
    slave.channels 2
    # Mix both stereo channels to mono (average them)
    ttable.0.0 0.5
    ttable.1.0 0.5
}

# =======================
# CAPTURE (Digital Microphone)
# =======================
# Software volume boost for faint microphone
pcm.capture {
    type softvol
    slave.pcm "mic_hw"
    control {
        name "Mic Gain"
        card 0
    }
    min_dB -12
    max_dB 36
}

pcm.mic_hw {
    type plug
    slave.pcm "hw:0,0"
}

# =======================
# CONTROL INTERFACE
# =======================
ctl.!default {
    type hw
    card 0
}