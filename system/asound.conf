# Mono downmix from stereo to mono
pcm.mono_downmix {
    type route
    slave.pcm "hw:0,0"
    slave.channels 2
    ttable.0.0 1  # left -> mono
    ttable.1.0 1  # right -> mono
}

# Software volume control exposed as Master
pcm.master {
    type softvol
    slave.pcm "mono_downmix"
    control {
        name "Master"      # now visible to amixer / alsamixer
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

# Default PCM uses Master
pcm.!default {
    type plug
    slave.pcm "master"
}

ctl.!default {
    type hw
    card 0
}