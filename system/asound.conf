# ---------------- PLAYBACK ----------------

pcm.mono_downmix {
    type route
    slave.pcm "hw:0,0"
    slave.channels 2
    ttable.0.0 1
    ttable.1.0 1
}

pcm.master {
    type softvol
    slave.pcm "mono_downmix"
    control {
        name "Master"
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

pcm.!default {
    type plug
    slave.pcm "master"
}

# ---------------- CAPTURE ----------------

pcm.i2s_mic {
    type plug
    slave.pcm "hw:0,0"
}

pcm.mic_boost {
    type softvol
    slave.pcm "i2s_mic"
    control {
        name "Mic Boost"
        card 0
    }
}

pcm.!capture {
    type plug
    slave.pcm "mic_boost"
}

# ---------------- CONTROL ----------------

ctl.!default {
    type hw
    card 0
}