# =======================
# GOOGLE VOICEHAT I2S SOUNDCARD CONFIG
# =======================
# Optimized for: dtoverlay=googlevoicehat-soundcard
# Hardware: I2S amplifier + digital microphone
# Card 0: Google voiceHAT SoundCard (mono device)

# Default PCM: asymmetric playback/capture
pcm.!default {
    type asym
    playback.pcm "playback"
    capture.pcm "capture"
}

# =======================
# PLAYBACK (I2S Amplifier)
# =======================
# Route stereo to mono L+R mix for the single amplifier
pcm.playback {
    type plug
    slave.pcm "amp_mono"
}

pcm.amp_mono {
    type route
    slave.pcm "hw:0,0"
    slave.channels 2
    # Mix both stereo channels to mono (average them)
    ttable.0.0 0.5
    ttable.1.0 0.5
}

# =======================
# CAPTURE (Digital Microphone)
# =======================
# Direct connection to the PDM microphone on card 0
# Software volume boost to amplify faint digital mic
pcm.capture {
    type softvol
    slave.pcm "mic_direct"
    control {
        name "Mic Gain"
        card 0
    }
    min_dB -12
    max_dB 36
}

pcm.mic_direct {
    type plug
    slave.pcm "hw:0,0"
}

# =======================
# CONTROL INTERFACE
# =======================
ctl.!default {
    type hw
    card 0
}